# A régénérer avant un vrai déploiement, ne pas commit les vraies valeurs en prod :
# kubectl create secret generic backend-secret --from-literal=JWT_SECRET=$(openssl rand -hex 32) --from-literal=DB_USER=... --from-literal=DB_PASSWORD=... --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  JWT_SECRET: change_this_secret_in_production
  DB_USER: change_this_user_in_production
  DB_PASSWORD: change_this_password_in_production
